<!DOCTYPE html>

<html class="dark" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fehler - TidyUp</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13b6ec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000",
                        "container-dark": "#1A1A1A",
                        "text-main": "#F8FAFC",
                        "text-secondary": "#94A3B8"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .industrial-border {
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
    </style>
</head>
<body class="bg-[#000000] text-text-main font-display min-h-screen flex items-center justify-center p-6">
<!-- Main Container -->
<main class="w-full max-w-[480px] bg-container-dark rounded-lg industrial-border shadow-2xl overflow-hidden">
<!-- Header Branding (Optional for TidyUp Context) -->
<div class="px-8 pt-8 flex justify-center">
<div class="flex items-center space-x-2">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<span class="text-[10px] uppercase tracking-[0.2em] text-primary/60 font-bold">System Monitor</span>
</div>
</div>
<div class="p-8 md:p-12 flex flex-col items-center text-center">
<!-- Illustration: Industrial Warning Triangle / Broken Circuit -->
<div class="relative mb-10">
<!-- Decorative Glow -->
<div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full"></div>
<!-- Icon Construction -->
<div class="relative flex items-center justify-center w-24 h-24">
<svg class="text-primary" fill="none" height="80" viewbox="0 0 24 24" width="80" xmlns="http://www.w3.org/2000/svg">
<!-- Broken Circuit Industrial Style -->
<path d="M12 2L3 20H21L12 2Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
<path d="M12 9V13" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
<path d="M12 17V17.01" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
<!-- Industrial Accents -->
<path d="M4.5 17L2 17" stroke="currentColor" stroke-dasharray="2 2" stroke-width="1"></path>
<path d="M19.5 17L22 17" stroke="currentColor" stroke-dasharray="2 2" stroke-width="1"></path>
</svg>
</div>
</div>
<!-- Text Content -->
<div class="space-y-4 mb-10">
<h1 class="text-2xl md:text-3xl font-bold text-text-main tracking-tight">
                    Ein Fehler ist aufgetreten
                </h1>
<p class="text-text-secondary text-sm md:text-base leading-relaxed max-w-sm mx-auto">
                    Unerwarteter Systemfehler. Bitte lade die Seite neu oder versuche es später noch einmal.
                </p>
</div>
<!-- Action Area -->
<div class="w-full space-y-4">
<button class="w-full bg-primary hover:bg-[#11a5d6] text-[#000000] font-bold py-3.5 rounded-lg transition-colors duration-200 flex items-center justify-center space-x-2 group">
<span class="material-icons text-[20px] group-hover:rotate-180 transition-transform duration-500">refresh</span>
<span>Neu laden</span>
</button>
<a class="inline-block text-text-secondary hover:text-primary text-xs uppercase tracking-widest transition-colors duration-200" href="#">
                    Support kontaktieren
                </a>
</div>
</div>
<!-- System Metadata Footer -->
<div class="px-8 py-4 bg-black/40 border-t border-white/5 flex justify-between items-center text-[10px] text-text-secondary/40 font-mono">
<span>ERROR_ID: TX-9942-B</span>
<span>TIDYUP OS v2.4.0</span>
</div>
</main>
<!-- Background Grid Detail -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-20" data-alt="Minimalist dark technical grid pattern background" style="background-image: linear-gradient(#1A1A1A 1px, transparent 1px), linear-gradient(90deg, #1A1A1A 1px, transparent 1px); background-size: 40px 40px;">
</div>
</body></html>
