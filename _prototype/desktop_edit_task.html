<!DOCTYPE html>

<html class="dark" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#13b6ec",
            "background-light": "#f6f8f8",
            "background-dark": "#000000",
            "surface": "#1A1A1A",
            "destructive": "#ef4444",
          },
          fontFamily: {
            "display": ["Inter"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center font-display p-4">
<!-- Desktop Background Mockup (Simulated background content) -->
<div class="fixed inset-0 z-0 opacity-20 pointer-events-none grid grid-cols-4 gap-4 p-8">
<div class="h-32 bg-primary/10 rounded-lg"></div>
<div class="h-32 bg-primary/10 rounded-lg"></div>
<div class="h-32 bg-primary/10 rounded-lg"></div>
<div class="h-32 bg-primary/10 rounded-lg"></div>
<div class="h-64 bg-primary/10 rounded-lg col-span-2"></div>
<div class="h-64 bg-primary/10 rounded-lg col-span-2"></div>
</div>
<!-- Edit Task Modal -->
<div class="relative z-10 w-full max-w-[600px] bg-surface rounded-lg shadow-2xl border border-white/5 overflow-hidden">
<!-- Modal Header -->
<div class="px-8 py-6 border-b border-white/5 flex items-center justify-between">
<h1 class="text-xl font-bold text-white tracking-tight">Aufgabe bearbeiten</h1>
<button class="text-white/40 hover:text-white transition-colors">
<span class="material-icons">close</span>
</button>
</div>
<!-- Modal Form Body -->
<div class="p-8 space-y-6">
<!-- Task Name -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-wider text-white/50">Aufgabenname</label>
<input class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder-white/20" placeholder="Z.B. Müll rausbringen" type="text" value="Küche gründlich reinigen"/>
</div>
<div class="grid grid-cols-2 gap-6">
<!-- Assignee Dropdown -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-wider text-white/50">Verantwortlich</label>
<div class="relative group">
<button class="w-full flex items-center justify-between bg-black/40 border border-white/10 rounded-lg px-4 py-2.5 text-white hover:border-white/20 transition-all">
<div class="flex items-center gap-3">
<img class="w-6 h-6 rounded-full object-cover" data-alt="User avatar of a male person" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB8ef_FDuBXDhuQ3RKrRasvKflVpp6xBJN5OGp4xieWXs6hzypF8m4mf4P4n9O59itDuRs6Hc451MiBZufEm8e_gABlS12xfy71oS_3QFCtNofti5FD_x94jwQox_mNwK2_vJtMUi1AZzSxKIZfbc6LBXaedGRYsZ_1ULS7eqEL9nr8FfEiC0gfJ06zyp0TdCJVZPK7Gre8BH6pL6E6IRKlY4cpOaNlybsF-CIq6D-yyuT-QHLDWLEs1H3Pup60xvjk8QGOnTwjGCMj"/>
<span class="text-sm">Lukas Weber</span>
</div>
<span class="material-icons text-white/40 group-hover:text-primary text-xl">expand_more</span>
</button>
</div>
</div>
<!-- Due Date -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-wider text-white/50">Fälligkeitsdatum</label>
<div class="relative">
<input class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all [color-scheme:dark]" type="date" value="2023-10-27"/>
</div>
</div>
</div>
<!-- Frequency Dropdown -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-wider text-white/50">Häufigkeit</label>
<div class="relative">
<select class="w-full appearance-none bg-black/40 border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-primary transition-all">
<option>Einmalig</option>
<option selected="">Wöchentlich</option>
<option>Alle 2 Wochen</option>
<option>Monatlich</option>
</select>
<span class="material-icons absolute right-4 top-1/2 -translate-y-1/2 text-white/40 pointer-events-none">unfold_more</span>
</div>
</div>
<!-- Priority Segmented Control -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-wider text-white/50">Priorität</label>
<div class="grid grid-cols-3 gap-0 bg-black/60 p-1 rounded-lg border border-white/5">
<button class="py-2 text-sm font-medium text-white/60 hover:text-white rounded transition-all">Niedrig</button>
<button class="py-2 text-sm font-medium bg-primary text-white rounded shadow-lg shadow-primary/20">Mittel</button>
<button class="py-2 text-sm font-medium text-white/60 hover:text-white rounded transition-all">Hoch</button>
</div>
</div>
<!-- Notes/Description -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-wider text-white/50">Notizen / Beschreibung</label>
<textarea class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder-white/20 custom-scrollbar" placeholder="Zusätzliche Details zur Aufgabe..." rows="4">Inklusive Oberflächen abwischen, Boden wischen und Kühlschrank kontrollieren.</textarea>
</div>
</div>
<!-- Modal Footer Actions -->
<div class="px-8 py-6 bg-black/20 border-t border-white/5 flex items-center justify-between">
<button class="flex items-center gap-2 px-4 py-2.5 border border-destructive text-destructive rounded-lg hover:bg-destructive hover:text-white font-semibold text-sm transition-all">
<span class="material-icons text-sm">delete</span>
        Löschen
      </button>
<div class="flex items-center gap-3">
<button class="px-6 py-2.5 text-white/60 hover:text-white font-semibold text-sm transition-all">
          Abbrechen
        </button>
<button class="px-8 py-2.5 bg-primary text-white rounded-lg font-bold text-sm hover:brightness-110 active:scale-95 transition-all shadow-lg shadow-primary/20">
          Speichern
        </button>
</div>
</div>
</div>
</body></html>
