<!DOCTYPE html>

<html class="dark" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#13b6ec",
                "background-light": "#f6f8f8",
                "background-dark": "#000000",
              },
              fontFamily: {
                "display": ["Inter", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
<title>Flatmate Onboarding</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-[#F8FAFC] font-display selection:bg-primary/30">
<!-- Mobile Device Container (iPhone 13/14 Pro style) -->
<div class="relative min-h-screen max-w-md mx-auto overflow-hidden flex flex-col justify-between p-6">
<!-- Status Bar & Top Navigation -->
<header class="flex justify-between items-center w-full pt-4">
<!-- Left Side (Time Mockup) -->
<div class="text-sm font-semibold opacity-90 px-2">9:41</div>
<!-- Skip Button -->
<button class="text-sm font-medium text-[#94A3B8] hover:text-primary transition-colors duration-200 px-2">
                Überspringen
            </button>
</header>
<!-- Illustration Area (Top Half) -->
<main class="flex-grow flex flex-col items-center justify-center space-y-12">
<!-- Industrial Minimalist Illustration Container -->
<div class="relative w-64 h-64 flex items-center justify-center">
<!-- Abstract Background Shapes -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl"></div>
<!-- SVG Illustration: Minimalist Cleaning/Dollar/Shared Expense -->
<div class="relative z-10 flex flex-col items-center">
<div class="w-32 h-32 border-4 border-primary rounded-xl flex items-center justify-center relative shadow-[0_0_20px_rgba(19,182,236,0.2)]">
<span class="material-icons text-primary text-6xl">payments</span>
<!-- Mini "Split" Indicators -->
<div class="absolute -top-4 -right-4 w-12 h-12 bg-background-dark border-2 border-primary/50 rounded-full flex items-center justify-center">
<span class="material-icons text-primary text-xl">call_split</span>
</div>
<!-- Industrial Gear Decor -->
<div class="absolute -bottom-2 -left-2 w-8 h-8 text-primary/40">
<span class="material-icons text-2xl">settings</span>
</div>
</div>
</div>
</div>
<!-- Content Area -->
<div class="text-center px-4">
<h1 class="text-3xl font-bold mb-4 tracking-tight">
                    Track Expenses
                </h1>
<p class="text-[#94A3B8] text-base leading-relaxed max-w-[280px] mx-auto">
                    Gemeinsame Ausgaben erfassen und fair aufteilen — ganz ohne Stress.
                </p>
</div>
</main>
<!-- Footer Area (Bottom Controls) -->
<footer class="space-y-8 pb-8">
<!-- Progress Dots -->
<div class="flex justify-center items-center gap-2">
<div class="w-2.5 h-2.5 rounded-full bg-primary shadow-[0_0_8px_rgba(19,182,236,0.6)]"></div>
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
</div>
<!-- Primary Action Button -->
<div class="w-full px-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg transition-all duration-300 active:scale-[0.98] shadow-lg shadow-primary/10">
                    Weiter
                </button>
</div>
</footer>
<!-- iPhone Indicator Mockup -->
<div class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-white/20 rounded-full"></div>
</div>
</body></html>
