<!DOCTYPE html>

<html class="dark" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13b6ec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000", /* Overridden to Pure Black for this specific design */
                        "neutral-dark": "#1a1a1a",
                        "text-main": "#F8FAFC",
                        "text-muted": "#94A3B8"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            background-color: #000000;
            color: #F8FAFC;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display flex flex-col min-h-screen max-w-md mx-auto relative border-x border-primary/10 overflow-hidden shadow-2xl">
<!-- iOS Status Bar Placeholder -->
<div class="h-12 w-full flex justify-between items-center px-6 pt-4 sticky top-0 z-50 bg-black">
<div class="text-sm font-semibold">9:41</div>
<div class="flex gap-1.5 items-center">
<span class="material-icons text-sm opacity-50">signal_cellular_off</span>
<span class="material-icons text-sm opacity-50">wifi_off</span>
<span class="material-icons text-sm">battery_full</span>
</div>
</div>
<!-- Main Content: Offline State -->
<main class="flex-1 flex flex-col items-center justify-center px-8 text-center">
<!-- Illustration Container -->
<div class="mb-10 relative">
<div class="w-32 h-32 bg-primary/10 rounded-full flex items-center justify-center animate-pulse">
<span class="material-icons text-primary text-7xl" style="font-size: 80px;">cloud_off</span>
</div>
<!-- Decorative Industrial Elements -->
<div class="absolute -top-2 -right-2 w-4 h-4 border-t-2 border-r-2 border-primary"></div>
<div class="absolute -bottom-2 -left-2 w-4 h-4 border-b-2 border-left-2 border-primary"></div>
</div>
<!-- Typography Block -->
<div class="space-y-4">
<h1 class="text-2xl font-bold tracking-tight text-white leading-tight">
                Keine Internetverbindung
            </h1>
<p class="text-text-muted text-base leading-relaxed px-2">
                Keine Sorge. Deine Änderungen werden lokal gespeichert und synchronisiert, sobald du wieder online bist.
            </p>
</div>
<!-- Action Area -->
<div class="mt-12 w-full">
<button class="w-full bg-primary hover:bg-primary/90 text-black font-bold py-4 rounded-lg transition-all active:scale-[0.98] min-h-[48px] flex items-center justify-center gap-2">
<span class="material-icons text-xl">refresh</span>
                Erneut versuchen
            </button>
</div>
</main>
<!-- Navigation Background Blur Effect -->
<div class="h-24 w-full bg-gradient-to-t from-black via-black/80 to-transparent absolute bottom-0 pointer-events-none"></div>
<!-- Bottom Navigation Bar -->
<nav class="sticky bottom-0 w-full bg-neutral-dark/80 backdrop-blur-xl border-t border-white/5 pb-8 pt-3 px-6 z-50">
<div class="flex justify-between items-center">
<button class="flex flex-col items-center gap-1 opacity-50 transition-opacity">
<span class="material-icons text-2xl">checklist</span>
<span class="text-[10px] uppercase tracking-wider font-semibold">Aufgaben</span>
</button>
<button class="flex flex-col items-center gap-1 opacity-50 transition-opacity">
<span class="material-icons text-2xl">folder_open</span>
<span class="text-[10px] uppercase tracking-wider font-semibold">Ordner</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-icons text-2xl">cloud_off</span>
<span class="text-[10px] uppercase tracking-wider font-semibold">Offline</span>
</button>
<button class="flex flex-col items-center gap-1 opacity-50 transition-opacity">
<span class="material-icons text-2xl">bar_chart</span>
<span class="text-[10px] uppercase tracking-wider font-semibold">Statistik</span>
</button>
<button class="flex flex-col items-center gap-1 opacity-50 transition-opacity">
<span class="material-icons text-2xl">settings</span>
<span class="text-[10px] uppercase tracking-wider font-semibold">Optionen</span>
</button>
</div>
<!-- iOS Home Indicator -->
<div class="w-32 h-1 bg-white/20 mx-auto mt-6 rounded-full"></div>
</nav>
<!-- Decorative Industrial Grid Overlay (Subtle) -->
<div class="absolute inset-0 pointer-events-none opacity-[0.03]" style="background-image: linear-gradient(#13b6ec 1px, transparent 1px), linear-gradient(90deg, #13b6ec 1px, transparent 1px); background-size: 40px 40px;"></div>
</body></html>
