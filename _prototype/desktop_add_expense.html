<!DOCTYPE html>

<html class="dark" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13b6ec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000",
                        "surface-dark": "#1A1A1A",
                        "input-dark": "#252525",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #13b6ec;
        }
    </style>
</head>
<body class="bg-background-dark text-slate-200 min-h-screen flex items-center justify-center font-display selection:bg-primary/30">
<!-- Modal Backdrop Overlay -->
<div class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="bg-surface-dark w-full max-w-lg rounded-lg shadow-2xl border border-white/5 overflow-hidden">
<!-- Header -->
<div class="px-8 pt-8 pb-4 flex justify-between items-center">
<h1 class="text-xl font-semibold text-white tracking-tight">Neue Ausgabe hinzufügen</h1>
<button class="text-slate-500 hover:text-white transition-colors">
<span class="material-icons text-xl">close</span>
</button>
</div>
<form class="px-8 pb-8 space-y-6">
<!-- Hero Amount Input -->
<div class="text-center py-4">
<label class="block text-xs font-medium text-slate-500 uppercase tracking-widest mb-2">Betrag</label>
<div class="relative flex items-center justify-center group">
<span class="text-4xl font-bold text-primary mr-2">€</span>
<input class="bg-transparent border-none text-5xl font-extrabold text-white text-center focus:ring-0 w-48 p-0" placeholder="0,00" type="text" value="0,00"/>
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-32 h-0.5 bg-primary/20 group-focus-within:bg-primary transition-colors"></div>
</div>
</div>
<!-- Form Fields Grid -->
<div class="space-y-4">
<!-- Description -->
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-400">Beschreibung</label>
<div class="relative group">
<input class="w-full bg-input-dark border border-white/10 rounded-lg px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="Wofür?" type="text"/>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Category Dropdown -->
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-400">Kategorie</label>
<div class="relative">
<select class="w-full bg-input-dark border border-white/10 rounded-lg px-4 py-3 text-white appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
<option>Lebensmittel</option>
<option>Miete</option>
<option>Haushalt</option>
<option>Freizeit</option>
<option>Transport</option>
</select>
<span class="material-icons absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Date Picker -->
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-400">Datum</label>
<div class="relative">
<input class="w-full bg-input-dark border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all [color-scheme:dark]" type="date"/>
</div>
</div>
</div>
<!-- Payer Selection -->
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-400">Bezahlt von</label>
<div class="relative">
<button class="w-full bg-input-dark border border-white/10 rounded-lg px-4 py-3 flex items-center justify-between text-white hover:bg-input-dark/80 transition-all" type="button">
<div class="flex items-center gap-3">
<img class="w-6 h-6 rounded-full border border-white/20" data-alt="User avatar male" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwaR5uYlUCKqqpgSbBEyEddeABG2hX2kcWyw2YFmVw1QCV6kfoHkNfGcJSyC0G4MViuE4Q8QArfe7cj3xjAlA-Zgbf8Wfz0UeRW1n7aY8a_wrlzrOTgAGxPJ0zIbm-AOwdV59cP4zsoOKJV-OtTaKbeiobCJB3pY5GS2cEFl3L4wMpEdCEOevwpZf1AUmMcnDfMZPKaqvLzmbmJ6IfFBKcjtPUE1BuaJLz0Ii8MsDbP4iragOK6FfnPkVUwiArNqs7admEKn67hunO"/>
<span>Du</span>
</div>
<span class="material-icons text-slate-500">expand_more</span>
</button>
</div>
</div>
<!-- Split Method Segmented Control -->
<div class="space-y-2">
<label class="text-sm font-medium text-slate-400">Aufteilung</label>
<div class="grid grid-cols-3 bg-input-dark p-1 rounded-lg border border-white/5">
<button class="py-2 text-sm font-medium rounded bg-white/10 text-white shadow-sm transition-all" type="button">Gleich</button>
<button class="py-2 text-sm font-medium text-slate-500 hover:text-white transition-all" type="button">Exakt</button>
<button class="py-2 text-sm font-medium text-slate-500 hover:text-white transition-all" type="button">Prozent</button>
</div>
</div>
</div>
<!-- Action Footer -->
<div class="flex items-center gap-4 pt-4">
<button class="flex-1 py-3 text-sm font-semibold text-slate-400 hover:text-white hover:bg-white/5 rounded-lg transition-all" type="button">
                        Abbrechen
                    </button>
<button class="flex-1 py-3 text-sm font-bold bg-primary text-black rounded-lg hover:brightness-110 active:scale-[0.98] transition-all shadow-lg shadow-primary/20" type="submit">
                        Speichern
                    </button>
</div>
</form>
</div>
</div>
</body></html>
