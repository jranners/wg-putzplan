<!DOCTYPE html>

<html class="dark" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#13b6ec",
            "background-light": "#f6f8f8",
            "background-dark": "#000000", // Pure black as requested
            "card-dark": "#1A1A1A",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    body {
      background-color: #000000;
      color: #F8FAFC;
    }
  </style>
</head>
<body class="font-display antialiased min-h-screen flex items-center justify-center p-6 bg-background-dark">
<!-- Onboarding Wrapper -->
<div class="relative w-full max-w-2xl">
<!-- Top Right Skip Button -->
<div class="absolute -top-12 right-0">
<button class="text-primary/80 hover:text-primary transition-colors text-sm font-medium">
        Überspringen
      </button>
</div>
<!-- Main Onboarding Card -->
<div class="bg-card-dark rounded-lg p-10 md:p-16 flex flex-col items-center text-center shadow-2xl border border-white/5">
<!-- Illustration Area -->
<div class="mb-10 relative">
<div class="w-48 h-64 bg-primary/10 rounded-lg flex items-center justify-center relative overflow-hidden group">
<!-- Abstract Industrial Receipt Illustration -->
<div class="absolute inset-0 flex flex-col items-center justify-center space-y-4">
<!-- Receipt Paper Shape -->
<div class="w-24 h-32 bg-primary/20 border-2 border-primary rounded-sm relative flex flex-col p-3 space-y-2">
<div class="h-1 w-full bg-primary/40 rounded-full"></div>
<div class="h-1 w-3/4 bg-primary/40 rounded-full"></div>
<div class="h-1 w-1/2 bg-primary/40 rounded-full"></div>
<div class="mt-auto flex justify-between items-end">
<span class="material-icons text-primary text-4xl leading-none">attach_money</span>
</div>
</div>
<!-- Floating Decorative Elements -->
<div class="absolute -top-4 -right-4 w-12 h-12 border border-primary/30 rounded-full"></div>
<div class="absolute bottom-4 -left-6 w-8 h-8 bg-primary/20 rounded-sm rotate-12"></div>
</div>
<!-- Background Glow -->
<div class="absolute inset-0 bg-primary/5 blur-3xl rounded-full"></div>
</div>
</div>
<!-- Text Content -->
<div class="space-y-4 max-w-md">
<h1 class="text-3xl font-bold text-white leading-tight">
          Ausgaben transparent tracken
        </h1>
<p class="text-white/60 text-lg leading-relaxed">
          Erfasse Einkäufe für die WG und teile die Kosten automatisch mit deinen Mitbewohnern.
        </p>
</div>
<!-- Progress Indicator -->
<div class="mt-12 mb-10 flex items-center space-x-3">
<div class="w-2 h-2 rounded-full bg-white/20"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary shadow-[0_0_8px_rgba(19,182,236,0.6)]"></div>
<div class="w-2 h-2 rounded-full bg-white/20"></div>
</div>
<!-- Navigation Footer -->
<div class="w-full flex items-center justify-between mt-auto pt-4">
<button class="px-8 py-3 rounded-lg font-semibold text-white/50 hover:text-white hover:bg-white/5 transition-all">
          Zurück
        </button>
<div class="flex items-center space-x-4">
<span class="text-xs text-white/30 font-medium uppercase tracking-widest">Schritt 2 von 3</span>
<button class="bg-primary hover:bg-primary/90 text-background-dark px-10 py-3 rounded-lg font-bold shadow-lg shadow-primary/20 transition-all flex items-center">
            Weiter
            <span class="material-icons ml-2 text-sm">arrow_forward</span>
</button>
</div>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-20">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-primary/5 blur-[100px] rounded-full"></div>
</div>
</div>
<!-- Hidden Image Elements for descriptive purposes as per instructions -->
<div class="hidden">
<img data-alt="High-contrast cyan receipt icon with currency symbol" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgDX012mGircu0MVKV4NwGhabapOQFl6ufX4qPGQBzqtI64iOLV78RWddvXJGWoKbpwasUvYHruvgkyBnIJX8MWTk7gNMvlBOLz7HyVWoT4KNv1brq_kf51wK14ajS9oz-2EPrfcr498NBfBBTftkxKFeybCkm8FKcVKbbVwEMDTAFYJ4uewPzNNHFsJyoRd85HwMn8IRQlEksQcOPv5TJzEhTHY3KmO-kbGcD-0Q_Nxda-g0043WLN4xF4urwgVdVyppcBBc1jA5n"/>
</div>
</body></html>
