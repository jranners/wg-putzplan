<!DOCTYPE html>

<html class="dark" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Ausgabe hinzufügen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13b6ec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000", // Strictly pure black as requested
                        "surface-dark": "#1a1a1a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .cyan-cursor::after {
            content: '';
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #13b6ec;
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white font-display selection:bg-primary/30">
<!-- Mobile Screen Wrapper -->
<div class="relative min-h-screen flex flex-col max-w-md mx-auto overflow-hidden">
<!-- Header -->
<header class="flex items-center justify-between px-6 pt-12 pb-4">
<button class="p-2 -ml-2 hover:bg-surface-dark rounded-full transition-colors active:scale-95">
<span class="material-icons text-white/60">close</span>
</button>
<h1 class="text-sm font-semibold tracking-wider uppercase text-white/50">Neue Ausgabe</h1>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<!-- Main Form Area -->
<main class="flex-1 px-6 pb-32">
<!-- Amount Input Section -->
<div class="py-8 text-center">
<label class="block text-xs font-medium text-white/40 uppercase tracking-widest mb-2">Betrag eingeben</label>
<div class="flex items-center justify-center">
<span class="text-3xl font-light text-primary mr-2">€</span>
<div class="text-6xl font-bold tracking-tighter cyan-cursor">0,00</div>
</div>
</div>
<!-- Category Grid -->
<section class="mt-8">
<h2 class="text-xs font-semibold text-white/40 uppercase tracking-widest mb-4">Kategorie</h2>
<div class="grid grid-cols-3 gap-3">
<!-- Category Item -->
<button class="flex flex-col items-center justify-center p-4 bg-surface-dark border border-white/5 rounded-lg active:bg-primary/20 active:border-primary/50 transition-all">
<span class="material-icons text-primary mb-2">shopping_cart</span>
<span class="text-[10px] font-medium uppercase tracking-wide">Einkauf</span>
</button>
<!-- Category Item (Selected) -->
<button class="flex flex-col items-center justify-center p-4 bg-primary/10 border border-primary rounded-lg">
<span class="material-icons text-primary mb-2">home</span>
<span class="text-[10px] font-medium uppercase tracking-wide text-primary">Miete</span>
</button>
<!-- Category Item -->
<button class="flex flex-col items-center justify-center p-4 bg-surface-dark border border-white/5 rounded-lg active:bg-primary/20 transition-all">
<span class="material-icons text-white/60 mb-2">bolt</span>
<span class="text-[10px] font-medium uppercase tracking-wide">Strom</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-dark border border-white/5 rounded-lg active:bg-primary/20 transition-all">
<span class="material-icons text-white/60 mb-2">wifi</span>
<span class="text-[10px] font-medium uppercase tracking-wide">Internet</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-dark border border-white/5 rounded-lg active:bg-primary/20 transition-all">
<span class="material-icons text-white/60 mb-2">cleaning_services</span>
<span class="text-[10px] font-medium uppercase tracking-wide">Haushalt</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-dark border border-white/5 rounded-lg active:bg-primary/20 transition-all">
<span class="material-icons text-white/60 mb-2">more_horiz</span>
<span class="text-[10px] font-medium uppercase tracking-wide">Andere</span>
</button>
</div>
</section>
<!-- Split Control -->
<section class="mt-10">
<div class="flex items-center justify-between mb-4">
<h2 class="text-xs font-semibold text-white/40 uppercase tracking-widest">Aufteilung</h2>
</div>
<div class="flex p-1 bg-surface-dark border border-white/5 rounded-lg">
<button class="flex-1 py-2.5 text-sm font-semibold rounded bg-primary text-black transition-all">Gleich</button>
<button class="flex-1 py-2.5 text-sm font-semibold rounded text-white/60 hover:text-white transition-all">Exakt</button>
</div>
</section>
<!-- Payer Selection -->
<section class="mt-10">
<h2 class="text-xs font-semibold text-white/40 uppercase tracking-widest mb-4">Bezahlt von</h2>
<div class="flex items-center gap-4 overflow-x-auto hide-scrollbar pb-2">
<!-- Current User Selected -->
<button class="flex items-center flex-shrink-0 gap-3 p-2 pr-4 bg-primary/10 border border-primary/40 rounded-full">
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary">
<img alt="User Avatar" class="w-full h-full object-cover" data-alt="Close up portrait of a smiling young man" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBR0Ksn7aghxgc-8fnTN3OchhdkWIBwx1QgZsOy9d-OLXFYkgdPvuMwoSym11tPQCiB0KkOuAG_PaNj9cBBN6vo_39enMxj5vkc4CuN1YHnZdd01Gy6HwFrRKtNrJwJ-hoC_O5GGKmacayZRyIDRTNXqZPH2fBj31UgzGz5wm-Rkwks-sy4LAYwvFG7zrixxX-pBgbazZVcBvopdgJjuxFQYE0lPGLCDWa-om-Y_enja650hP59go6mfIl-TsdT4f7jICHny5OVMdmg"/>
</div>
<div class="text-left">
<p class="text-xs font-bold text-white">Ich</p>
<p class="text-[10px] text-primary">Ausgewählt</p>
</div>
</button>
<!-- Other User 1 -->
<button class="flex items-center flex-shrink-0 gap-3 p-2 pr-4 bg-surface-dark border border-white/5 rounded-full opacity-60">
<div class="w-10 h-10 rounded-full overflow-hidden grayscale">
<img alt="User Avatar" class="w-full h-full object-cover" data-alt="Portrait of a young woman with long hair" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB9zrUipS4p-uf8N2iSPI-idkqEEBRPuy3Lbp0cePVPf_XNZPUjOTHiW-tb66DywqRh4rLgXQ2EENwc6j4yBTmGwd4VAaR-ygRpbrQtwpmzK0D-Lcqs0ebmo2HZobxTFzwJe_peKP5oUdkItOweZFjFPI_1VOXQukzimNfLtG6k1B0XbhrpjGfd962Bi97zfmMcDChxYpq_Onuwx2A6NqHS9UrYyEOUtSAnLGzYrhjaW_cq3Uh0m386bOWjEFiDn7tT59LYyA5G4_u_"/>
</div>
<div class="text-left">
<p class="text-xs font-bold text-white">Sarah</p>
</div>
</button>
<!-- Other User 2 -->
<button class="flex items-center flex-shrink-0 gap-3 p-2 pr-4 bg-surface-dark border border-white/5 rounded-full opacity-60">
<div class="w-10 h-10 rounded-full overflow-hidden grayscale">
<img alt="User Avatar" class="w-full h-full object-cover" data-alt="Portrait of a man wearing glasses" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDGFqd1vDUQKw7i9NqMh0QvD49j8tsmlLx7x1zhIGbbdKe5wfhwT9zVDc-T74kXSIyehh01zKj6aTB39IpIf97nP15dgQZfZOrWNrRGbzqbRDkiE-tM6eGvuJVFW_2gRikpLsYylXmXUrssPkGwQ8XstPv0vh5rjXabuW36LPs_JSGxy4vTTMDfshMqya8ZBhbwN6r3f4Lt4HNWxEVVTk_tSlL40XGDzSIQAe3YGq7aVdJw8Uas72FmS0lSMeHr_7LNsc0HvZgLkZ_T"/>
</div>
<div class="text-left">
<p class="text-xs font-bold text-white">Lukas</p>
</div>
</button>
</div>
</section>
</main>
<!-- Bottom Action Bar (Fixed) -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 bg-gradient-to-t from-background-dark via-background-dark to-transparent">
<button class="w-full h-[56px] bg-primary text-black font-bold text-lg rounded-lg shadow-[0_0_20px_rgba(19,182,236,0.3)] active:scale-[0.98] active:brightness-90 transition-all flex items-center justify-center gap-2">
<span>Speichern</span>
<span class="material-icons">chevron_right</span>
</button>
</div>
<!-- Touch Indicator (iOS Style) -->
<div class="fixed bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/10 rounded-full pointer-events-none"></div>
</div>
</body></html>
