<!DOCTYPE html>

<html class="dark" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13b6ec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            background-color: #000000;
            color: #F8FAFC;
        }
        .ios-status-bar {
            height: 44px;
        }
        .bottom-nav {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .industrial-glow {
            box-shadow: 0 0 20px rgba(19, 182, 236, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display">
<!-- Mobile Screen Wrapper -->
<div class="flex flex-col h-screen max-w-md mx-auto relative overflow-hidden bg-background-dark">
<!-- iOS Status Bar Placeholder -->
<div class="ios-status-bar flex justify-between items-center px-6 w-full shrink-0">
<span class="text-xs font-semibold">9:41</span>
<div class="flex items-center space-x-1">
<span class="material-icons text-[14px]">signal_cellular_alt</span>
<span class="material-icons text-[14px]">wifi</span>
<span class="material-icons text-[14px]">battery_full</span>
</div>
</div>
<!-- Main Content Area -->
<div class="flex-grow flex flex-col items-center justify-center px-8 text-center">
<!-- Illustration: Industrial Coffee & Check -->
<div class="relative w-48 h-48 mb-10 flex items-center justify-center">
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl"></div>
<!-- Custom SVG Illustration for Industrial Precision -->
<svg class="relative z-10" fill="none" height="120" viewbox="0 0 24 24" width="120" xmlns="http://www.w3.org/2000/svg">
<path d="M18 8H20C21.1046 8 22 8.89543 22 10V12C22 13.1046 21.1046 14 20 14H18" stroke="#13b6ec" stroke-linecap="round" stroke-width="1.5"></path>
<path d="M2 10C2 7.23858 4.23858 5 7 5H15C17.7614 5 20 7.23858 20 10V14C20 17.866 16.866 21 13 21H9C5.13401 21 2 17.866 2 14V10Z" stroke="#13b6ec" stroke-width="1.5"></path>
<path d="M6 1L6 3" stroke="#13b6ec" stroke-linecap="round" stroke-width="1.5"></path>
<path d="M10 1L10 3" stroke="#13b6ec" stroke-linecap="round" stroke-width="1.5"></path>
<path d="M14 1L14 3" stroke="#13b6ec" stroke-linecap="round" stroke-width="1.5"></path>
<path d="M7.5 13L10 15.5L14.5 10.5" stroke="#13b6ec" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<!-- Typography Block -->
<h1 class="text-2xl font-bold text-[#F8FAFC] tracking-tight mb-3">
                Alles erledigt!
            </h1>
<p class="text-white/60 text-base leading-relaxed max-w-[280px]">
                Herausragende Arbeit. Deine WG glänzt und alle Aufgaben sind erledigt.
            </p>
</div>
<!-- Action Button -->
<div class="px-6 pb-8">
<button class="w-full bg-primary text-black font-semibold py-4 rounded-lg flex items-center justify-center space-x-2 active:scale-[0.98] transition-transform duration-75 h-[52px] industrial-glow">
<span class="material-icons text-xl">add</span>
<span>Aufgabe erstellen</span>
</button>
</div>
<!-- Bottom Navigation Bar -->
<nav class="bottom-nav bg-background-dark border-t border-white/10 w-full grid grid-cols-3 pt-3 pb-6">
<button class="flex flex-col items-center justify-center space-y-1 text-primary">
<span class="material-icons text-2xl">checklist</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Aufgaben</span>
</button>
<button class="flex flex-col items-center justify-center space-y-1 text-white/40">
<span class="material-icons text-2xl">bar_chart</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Statistik</span>
</button>
<button class="flex flex-col items-center justify-center space-y-1 text-white/40">
<span class="material-icons text-2xl">settings</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Optionen</span>
</button>
</nav>
<!-- Home Indicator (iOS) -->
<div class="flex justify-center w-full pb-2 absolute bottom-0">
<div class="w-32 h-1 bg-white/20 rounded-full"></div>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none opacity-20 -z-10">
<div class="absolute top-[-10%] left-[-20%] w-[60%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
</div>
</body></html>
